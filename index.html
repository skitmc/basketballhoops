<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basketball Hoops: Extreme</title>
    <style>
        body { margin: 0; background: #020202; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; overflow: hidden; user-select: none; }
        #game-wrap { position: relative; border: 4px solid #444; border-radius: 15px; box-shadow: 0 0 100px rgba(0, 229, 255, 0.3); }
        canvas { background: #0a0a0a; cursor: none; }
        #hud {
            position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; box-sizing: border-box; color: #fff; font-size: 30px; pointer-events: none; z-index: 10;
        }
        .stamina-bar { width: 150px; height: 10px; background: #333; border: 1px solid #fff; margin-top: 5px; position: relative; }
        .stamina-fill { width: 100%; height: 100%; background: #00ff88; transition: width 0.1s; }
        #timer { font-size: 50px; color: #ffcc00; }
        .msg { position: absolute; width: 100%; text-align: center; top: 150px; font-size: 70px; opacity: 0; transform: scale(0.5); transition: 0.2s; z-index: 20; text-shadow: 0 0 20px #000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="game-wrap">
        <div id="hud">
            <div>
                <div style="color: #00e5ff;">YOU <span id="pScore">0</span></div>
                <div class="stamina-bar"><div id="pStam" class="stamina-fill"></div></div>
            </div>
            <div id="timer">60</div>
            <div style="text-align: right;">
                <div style="color: #ff2a5f;">BOT <span id="bScore">0</span></div>
                <div class="stamina-bar" style="margin-left: auto;"><div id="bStam" class="stamina-fill"></div></div>
            </div>
        </div>
        <div id="announcer" class="msg">STREET BALL</div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const announcer = document.getElementById('announcer');
const timerEl = document.getElementById('timer');

canvas.width = 1100; canvas.height = 600;

const gravity = 0.5;
const floorY = 520;
let cameraShake = 0;
let timeLeft = 60;
let gameState = 'playing';
let particles = [];

let keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { 
    if(e.code === 'KeyX' && gameState === 'playing') handleAction(player);
    if(e.code === 'KeyW' && gameState === 'playing') handleJump(player);
    keys[e.code] = false; 
});

const clock = setInterval(() => {
    if (gameState === 'playing') {
        timeLeft--;
        timerEl.innerText = timeLeft;
        if (timeLeft <= 0) { gameState = 'gameover'; showMsg("GAME OVER!", "#fff"); }
    }
}, 1000);

class Player {
    constructor(x, color, isBot = false) {
        this.startX = x; this.x = x; this.y = floorY - 90;
        this.w = 40; this.h = 90;
        this.vx = 0; this.vy = 0;
        this.color = color;
        this.isBot = isBot;
        this.stamina = 100;
        this.jumpCount = 0;
        this.hasBall = false;
        this.streak = 0;
    }

    update() {
        let speed = (keys['ShiftLeft'] || keys['ShiftRight']) && this.stamina > 0 ? 10 : 6;
        if (!this.isBot && gameState === 'playing') {
            if (keys['KeyA']) { this.vx = -speed; if(speed > 6) this.stamina -= 1; }
            else if (keys['KeyD']) { this.vx = speed; if(speed > 6) this.stamina -= 1; }
            else { this.vx *= 0.8; this.stamina = Math.min(100, this.stamina + 0.5); }
        }

        this.x += this.vx; this.y += this.vy;
        if (this.y + this.h < floorY) { this.vy += gravity; } 
        else { this.y = floorY - this.h; this.vy = 0; this.jumpCount = 0; }
        this.x = Math.max(0, Math.min(canvas.width - this.w, this.x));
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.fillStyle = "#fff";
        ctx.fillRect(this.x + 5, this.y - 35, 30, 35); // Head
        if (this.streak >= 3) { // Fire aura
            ctx.shadowBlur = 20; ctx.shadowColor = "orange";
        }
    }
}

const ball = {
    x: 550, y: 100, r: 15, vx: 0, vy: 0,
    owner: null, cooldown: 0, isScoring: false,
    update() {
        if (this.cooldown > 0) this.cooldown--;
        if (this.owner) {
            this.x = this.owner.x + (this.owner.vx >= 0 ? 45 : -5);
            this.y = this.owner.y + 45 + Math.sin(Date.now()/70) * 10;
        } else {
            this.vy += gravity; this.x += this.vx; this.y += this.vy;
            if (this.y + this.r > floorY) { this.y = floorY - this.r; this.vy *= -0.6; this.vx *= 0.8; }
            if (this.x < 0 || this.x > canvas.width) this.vx *= -0.8;
            
            // Backboard Physics Logic
            this.checkBackboard(100, 220, true);  // Left
            this.checkBackboard(1000, 220, false); // Right
        }
    },
    checkBackboard(bx, by, isLeft) {
        let boardX = isLeft ? bx - 20 : bx;
        if (this.x + this.r > boardX && this.x - this.r < boardX + 20 && this.y > by - 90 && this.y < by + 40) {
            this.vx *= -0.8; 
            this.x = isLeft ? boardX + 20 + this.r : boardX - this.r;
            cameraShake = 3;
        }
    },
    draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = (player.streak >= 3 || bot.streak >= 3) ? "#ff4500" : "#ff8c00";
        ctx.fill(); ctx.stroke();
    }
};

const player = new Player(250, '#00e5ff');
const bot = new Player(850, '#ff2a5f', true);
let pScore = 0, bScore = 0;

function handleJump(p) {
    if (p.jumpCount < 2) { p.vy = -12; p.jumpCount++; }
}

function handleAction(p) {
    if (p.hasBall) {
        let targetX = (p === player) ? 1000 : 100;
        let dist = Math.abs(p.x - targetX);
        if (p.y < floorY - 50 && dist < 120) { // Dunk Fix
            p.hasBall = false; ball.owner = null; ball.x = targetX; ball.y = 230;
            ball.vx = 0; ball.vy = 10; cameraShake = 10;
            return;
        }
        p.hasBall = false; ball.owner = null; ball.cooldown = 30;
        let t = 45; ball.vx = (targetX - p.x) / t; ball.vy = -14;
    } else {
        let opp = (p === player) ? bot : player;
        if (Math.hypot(p.x - opp.x, p.y - opp.y) < 80 && opp.hasBall) {
            opp.hasBall = false; ball.owner = null; ball.vx = (p.x < opp.x ? -7 : 7);
            showMsg("STOLEN!", "#fff");
        }
    }
}

function showMsg(txt, col) {
    announcer.innerText = txt; announcer.style.color = col;
    announcer.style.opacity = 1; announcer.style.transform = "scale(1)";
    setTimeout(() => { announcer.style.opacity = 0; }, 1000);
}

function drawHoop(x, y, isLeft) {
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    ctx.fillRect(isLeft ? x-20 : x, y-90, 20, 130); // Backboard
    ctx.strokeStyle = "#ff2a5f"; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(isLeft ? x : x-60, y); ctx.lineTo(isLeft ? x+60 : x, y); ctx.stroke(); // Rim
}

function updateBot() {
    if (gameState !== 'playing') return;
    let d = ball.x - bot.x;
    if (!ball.owner) bot.vx = d > 0 ? 5 : -5;
    else if (bot.hasBall) { if (bot.x > 300) bot.vx = -5; else handleAction(bot); }
    else if (player.hasBall) { 
        bot.vx = (player.x - bot.x) > 0 ? 6 : -6;
        if (Math.abs(player.x - bot.x) < 60) handleAction(bot);
    }
    bot.update();
}

function checkScoring() {
    if (ball.vy > 0 && !ball.isScoring) {
        if (ball.x > 960 && ball.x < 1040 && Math.abs(ball.y - 220) < 20) score(true);
        if (ball.x < 140 && ball.x > 60 && Math.abs(ball.y - 220) < 20) score(false);
    }
}

function score(isP) {
    ball.isScoring = true; gameState = 'reset';
    if(isP) { pScore += (player.streak >= 3 ? 3 : 2); player.streak++; bot.streak = 0; showMsg("SWISH!", "#00e5ff"); }
    else { bScore += 2; bot.streak++; player.streak = 0; showMsg("BOT SCORES!", "#ff2a5f"); }
    document.getElementById('pScore').innerText = pScore;
    document.getElementById('bScore').innerText = bScore;
    setTimeout(reset, 1500);
}

function reset() {
    gameState = 'playing'; player.x = 250; bot.x = 850;
    ball.owner = (ball.x > 550) ? bot : player;
    ball.owner.hasBall = true; ball.isScoring = false; ball.vx = 0; ball.vy = 0;
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    if (cameraShake > 0) { ctx.translate(Math.random()*cameraShake, Math.random()*cameraShake); cameraShake *= 0.9; }
    
    // Draw Court Lines
    ctx.strokeStyle = "#333"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, floorY); ctx.lineTo(canvas.width, floorY); ctx.stroke();
    
    player.update(); updateBot(); ball.update();
    if (!ball.owner && ball.cooldown === 0 && gameState === 'playing') {
        [player, bot].forEach(p => { if (Math.hypot(p.x - ball.x, p.y - ball.y) < 50) { p.hasBall = true; ball.owner = p; } });
    }
    checkScoring();
    
    document.getElementById('pStam').style.width = player.stamina + "%";
    document.getElementById('bStam').style.width = bot.stamina + "%";
    
    drawHoop(100, 220, true); drawHoop(1000, 220, false);
    player.draw(); bot.draw(); ball.draw();
    ctx.restore();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
