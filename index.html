<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basketball Hoops: Street Stars</title>
    <style>
        body { margin: 0; background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #game-wrap { position: relative; border: 4px solid #333; box-shadow: 0 0 80px rgba(0, 150, 255, 0.2); }
        canvas { background: #0a0a0a; cursor: none; }
        #hud {
            position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; 
            padding: 20px 40px; box-sizing: border-box; color: #fff; font-size: 32px; pointer-events: none;
            text-shadow: 0 0 10px #000;
        }
        .msg { position: absolute; width: 100%; text-align: center; top: 100px; color: #00f2ff; font-size: 50px; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="game-wrap">
        <div id="hud">
            <div style="color: #00f2ff;">YOU: <span id="pScore">0</span></div>
            <div style="color: #ff0055;">BOT: <span id="bScore">0</span></div>
        </div>
        <div id="announcer" class="msg">STEAL!</div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const announcer = document.getElementById('announcer');

canvas.width = 1000;
canvas.height = 550;

const gravity = 0.4;
const floorY = 470;

let keys = {};
window.addEventListener('keydown', e => {
    if(e.code === 'KeyW') handleJump(player);
    if(e.code === 'KeyX') handleAction(player);
    keys[e.code] = true;
});
window.addEventListener('keyup', e => keys[e.code] = false);

class Player {
    constructor(x, color, isBot = false) {
        this.x = x; this.y = floorY - 90;
        this.w = 40; this.h = 90;
        this.vx = 0; this.vy = 0;
        this.color = color;
        this.isBot = isBot;
        this.jumpCount = 0;
        this.hasBall = false;
        this.actionTimer = 0; // For steal/block animation
    }

    update() {
        if (!this.isBot) {
            if (keys['KeyA']) this.vx = -7;
            else if (keys['KeyD']) this.vx = 7;
            else this.vx *= 0.8;
        }

        this.x += this.vx;
        this.y += this.vy;

        if (this.y + this.h < floorY) {
            this.vy += gravity;
        } else {
            this.y = floorY - this.h;
            this.vy = 0;
            this.jumpCount = 0;
        }
        this.x = Math.max(0, Math.min(canvas.width - this.w, this.x));
        if (this.actionTimer > 0) this.actionTimer--;
    }

    draw() {
        ctx.save();
        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.ellipse(this.x + this.w/2, floorY, 20, 5, 0, 0, Math.PI*2);
        ctx.fill();

        // Body Glow
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        
        // Character Body
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);
        
        // "Action" Visual (Steal/Block Swipe)
        if (this.actionTimer > 0) {
            ctx.strokeStyle = "white";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(this.x + this.w/2, this.y + 20, 50, -0.5, 0.5);
            ctx.stroke();
        }

        // Head
        ctx.fillStyle = "#f1c27d";
        ctx.fillRect(this.x + 5, this.y - 35, 30, 35);
        ctx.restore();
    }
}

const ball = {
    x: 500, y: 200, r: 14, vx: 0, vy: 0,
    owner: null, cooldown: 0,
    update() {
        if (this.cooldown > 0) this.cooldown--;
        if (this.owner) {
            this.x = this.owner.x + (this.owner.vx >= 0 ? 45 : -5);
            this.y = this.owner.y + 40 + Math.sin(Date.now()/80) * 15;
        } else {
            this.vy += gravity;
            this.x += this.vx;
            this.y += this.vy;
            if (this.y + this.r > floorY) {
                this.y = floorY - this.r;
                this.vy *= -0.6;
                this.vx *= 0.8;
            }
            if (this.x < 0 || this.x > canvas.width) this.vx *= -0.7;
        }
    },
    draw() {
        ctx.save();
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ff8c00";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = "#ff8c00";
        ctx.fill();
        ctx.restore();
    }
};

const player = new Player(150, '#00f2ff');
const bot = new Player(800, '#ff0055', true);
let pScore = 0, bScore = 0;

function handleJump(p) {
    if (p.jumpCount < 2) {
        p.vy = -11;
        p.jumpCount++;
    }
}

function handleAction(p) {
    if (p.hasBall) {
        // SHOOTING
        ball.owner = null;
        p.hasBall = false;
        ball.cooldown = 40;
        let targetX = (p === player) ? 930 : 70;
        let dist = targetX - p.x;
        ball.vx = dist * 0.035; // Softer throw
        ball.vy = -12 + (Math.abs(dist) * -0.005);
    } else {
        // STEALING / BLOCKING
        p.actionTimer = 10;
        let opponent = (p === player) ? bot : player;
        let d = Math.sqrt((p.x - opponent.x)**2 + (p.y - opponent.y)**2);
        
        if (d < 80 && opponent.hasBall) {
            opponent.hasBall = false;
            ball.owner = null;
            ball.vx = (p.x < opponent.x ? -5 : 5);
            ball.vy = -5;
            ball.cooldown = 20;
            showMsg("STEAL!");
        }
    }
}

function showMsg(txt) {
    announcer.innerText = txt;
    announcer.style.opacity = 1;
    setTimeout(() => announcer.style.opacity = 0, 1000);
}

function drawCourt() {
    // Ground
    let floorGrad = ctx.createLinearGradient(0, floorY, 0, canvas.height);
    floorGrad.addColorStop(0, '#111');
    floorGrad.addColorStop(1, '#000');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, floorY, canvas.width, canvas.height - floorY);

    // Neon Lines
    ctx.strokeStyle = "rgba(0, 242, 255, 0.3)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, floorY); ctx.lineTo(canvas.width, floorY);
    ctx.stroke();

    // 3pt Lines
    ctx.beginPath(); ctx.arc(0, floorY-150, 300, -Math.PI/2, Math.PI/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(1000, floorY-150, 300, Math.PI/2, -Math.PI/2); ctx.stroke();

    drawHoop(70, 220, true);
    drawHoop(930, 220, false);
}

function drawHoop(x, y, isLeft) {
    // Backboard
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    ctx.fillRect(isLeft ? x-15 : x, y-70, 15, 100);
    ctx.strokeStyle = "cyan";
    ctx.strokeRect(isLeft ? x-15 : x, y-70, 15, 100);

    // Rim
    ctx.strokeStyle = "#ff0055";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(isLeft ? x : x-50, y);
    ctx.lineTo(isLeft ? x+50 : x, y);
    ctx.stroke();

    // Animated Net
    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.setLineDash([2, 2]);
    for(let i=0; i<5; i++) {
        ctx.beginPath();
        let nx = isLeft ? x + (i*10) : x - 50 + (i*10);
        ctx.moveTo(nx, y);
        let sway = Math.sin(Date.now()/200 + i) * 3;
        ctx.quadraticCurveTo(nx + sway, y + 20, nx, y + 40);
        ctx.stroke();
    }
    ctx.setLineDash([]);
}

function updateBot() {
    let dToBall = ball.x - bot.x;
    if (!ball.owner && ball.cooldown === 0) {
        bot.vx = dToBall > 0 ? 4 : -4;
    } else if (bot.hasBall) {
        if (bot.x > 350) bot.vx = -5;
        else { bot.vx = 0; handleAction(bot); }
    } else if (player.hasBall) {
        // Aggressive Bot: tries to steal
        let dToPlayer = player.x - bot.x;
        bot.vx = dToPlayer > 0 ? 5 : -5;
        if (Math.abs(dToPlayer) < 60) handleAction(bot);
    }
    bot.update();
}

function checkScoring() {
    // You score Right (930)
    if (ball.vy > 0 && ball.x > 900 && ball.x < 960 && Math.abs(ball.y - 220) < 15) {
        pScore++; showMsg("SWISH!"); resetBall();
    }
    // Bot scores Left (70)
    if (ball.vy > 0 && ball.x < 100 && ball.x > 40 && Math.abs(ball.y - 220) < 15) {
        bScore++; showMsg("SCORE!"); resetBall();
    }
}

function resetBall() {
    ball.x = 500; ball.y = 100; ball.vx = 0; ball.vy = 0;
    ball.owner = null; player.hasBall = false; bot.hasBall = false;
    document.getElementById('pScore').innerText = pScore;
    document.getElementById('bScore').innerText = bScore;
}

function loop() {
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Vignette effect
    let v = ctx.createRadialGradient(500, 275, 100, 500, 275, 600);
    v.addColorStop(0, 'rgba(0,0,0,0)');
    v.addColorStop(1, 'rgba(0,0,0,0.8)');
    
    drawCourt();
    player.update();
    updateBot();
    ball.update();

    if (!ball.owner && ball.cooldown === 0) {
        [player, bot].forEach(p => {
            let dx = (p.x + p.w/2) - ball.x;
            let dy = (p.y + p.h/2) - ball.y;
            if (Math.sqrt(dx*dx + dy*dy) < 45) {
                p.hasBall = true; ball.owner = p;
            }
        });
    }

    checkScoring();
    player.draw();
    bot.draw();
    ball.draw();
    
    ctx.fillStyle = v;
    ctx.fillRect(0,0, canvas.width, canvas.height);
    
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
