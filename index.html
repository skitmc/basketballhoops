<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basketball Hoops - Full Court</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        #game-container { position: relative; border: 5px solid #444; }
        canvas { background: #d2a679; border-bottom: 20px solid #8b4513; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; pointer-events: none; color: #000; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div>PLAYER: <span id="pScore">0</span></div>
            <div>BOT: <span id="bScore">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1200;
canvas.height = 500;

// Game Settings
const gravity = 0.5;
const floorY = 450;
const hoopY = 200;

let keys = {};
window.addEventListener('keydown', e => {
    if(e.code === 'KeyW' && !keys['KeyW']) { // Jump trigger on press
        handleJump(player);
    }
    keys[e.code] = true;
});
window.addEventListener('keyup', e => {
    if(e.code === 'KeyX') shoot(player);
    keys[e.code] = false;
});

class Entity {
    constructor(x, color, isBot = false) {
        this.x = x;
        this.y = floorY;
        this.w = 30;
        this.h = 60;
        this.vx = 0;
        this.vy = 0;
        this.color = color;
        this.jumpCount = 0;
        this.hasBall = false;
        this.isBot = isBot;
        this.shotPower = 0;
    }

    update() {
        // Movement
        if(!this.isBot) {
            if (keys['KeyA']) this.vx = -5;
            else if (keys['KeyD']) this.vx = 5;
            else this.vx *= 0.8;

            if (keys['KeyX'] && this.hasBall) this.shotPower = Math.min(this.shotPower + 0.5, 15);
        }

        this.x += this.vx;
        this.y += this.vy;

        if (this.y + this.h < floorY) {
            this.vy += gravity;
        } else {
            this.y = floorY - this.h;
            this.vy = 0;
            this.jumpCount = 0;
        }

        // Keep in bounds
        this.x = Math.max(0, Math.min(canvas.width - this.w, this.x));
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);
        
        // Visual indicator for shot charging
        if (this.shotPower > 0) {
            ctx.fillStyle = 'red';
            ctx.fillRect(this.x, this.y - 10, this.shotPower * 2, 5);
        }
    }
}

const ball = {
    x: 600, y: 300, r: 12, vx: 0, vy: 0, 
    owner: null,
    dribbleTimer: 0,
    update() {
        if (this.owner) {
            this.x = this.owner.x + (this.owner.vx >= 0 ? 35 : -15);
            // Dribble animation
            this.dribbleTimer += 0.2;
            this.y = (this.owner.y + 30) + Math.sin(this.dribbleTimer) * 15;
            this.vx = 0;
            this.vy = 0;
        } else {
            this.vy += gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= 0.99;

            // Floor bounce
            if (this.y + this.r > floorY) {
                this.y = floorY - this.r;
                this.vy *= -0.7;
            }
            // Wall bounce
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        }
    },
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ff8c00';
        ctx.fill();
        ctx.stroke();
    }
};

const player = new Entity(200, 'blue');
const bot = new Entity(1000, 'red', true);
let pScore = 0, bScore = 0;

function handleJump(ent) {
    if (ent.jumpCount < 2) {
        ent.vy = -10;
        ent.jumpCount++;
    }
}

function shoot(ent) {
    if (!ent.hasBall) return;
    ball.owner = null;
    ent.hasBall = false;
    ball.vx = (ent === player ? 1 : -1) * (5 + ent.shotPower * 0.5);
    ball.vy = -8 - (ent.shotPower * 0.8);
    ent.shotPower = 0;
    
    // Quick cooldown so they don't instant-grab
    setTimeout(() => { ball.canBePicked = true; }, 500);
    ball.canBePicked = false;
}

function drawCourt() {
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 3;
    // Mid court
    ctx.beginPath(); ctx.moveTo(600, 0); ctx.lineTo(600, 500); ctx.stroke();
    ctx.beginPath(); ctx.arc(600, 250, 60, 0, Math.PI*2); ctx.stroke();
    // 3 Point Lines
    ctx.beginPath(); ctx.arc(0, hoopY+50, 150, -Math.PI/2, Math.PI/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(1200, hoopY+50, 150, Math.PI/2, -Math.PI/2); ctx.stroke();

    // Hoops
    drawHoop(50, hoopY, true);   // Left
    drawHoop(1150, hoopY, false); // Right
}

function drawHoop(x, y, isLeft) {
    ctx.fillStyle = "black";
    ctx.fillRect(isLeft ? x-10 : x, y-50, 10, 100); // Backboard
    ctx.strokeStyle = "red";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(isLeft ? x : x-50, y);
    ctx.lineTo(isLeft ? x+50 : x, y);
    ctx.stroke();
    
    // The Net
    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.lineWidth = 1;
    for(let i=0; i<5; i++) {
        ctx.beginPath();
        let netX = isLeft ? x + (i*10) : x - 50 + (i*10);
        ctx.moveTo(netX, y);
        ctx.lineTo(netX + (Math.sin(Date.now()/200)*2), y+30);
        ctx.stroke();
    }
}

function updateBot() {
    if (!ball.owner) {
        if (ball.x > bot.x) bot.vx = 3;
        else bot.vx = -3;
    } else if (bot.hasBall) {
        // Move to player's hoop (left side)
        if (bot.x > 150) bot.vx = -4;
        else {
            bot.vx = 0;
            bot.shotPower = 8;
            shoot(bot);
        }
    }
    bot.update();
}

function checkScoring() {
    // Left Hoop (Bot scores here)
    if (ball.vy > 0 && ball.x < 100 && Math.abs(ball.y - hoopY) < 20) {
        bScore++; resetGame();
    }
    // Right Hoop (Player scores here)
    if (ball.vy > 0 && ball.x > 1100 && Math.abs(ball.y - hoopY) < 20) {
        pScore++; resetGame();
    }
}

function resetGame() {
    ball.x = 600; ball.y = 100; ball.vx = 0; ball.vy = 0;
    ball.owner = null;
    player.hasBall = false; bot.hasBall = false;
    document.getElementById('pScore').innerText = pScore;
    document.getElementById('bScore').innerText = bScore;
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawCourt();
    
    player.update();
    updateBot();
    ball.update();

    // Pickup Logic
    [player, bot].forEach(e => {
        let dx = e.x - ball.x;
        let dy = e.y - ball.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 50 && !ball.owner && ball.canBePicked !== false) {
            e.hasBall = true;
            ball.owner = e;
        }
    });

    checkScoring();

    player.draw();
    bot.draw();
    ball.draw();

    requestAnimationFrame(loop);
}

ball.canBePicked = true;
loop();
</script>
</body>
</html>
