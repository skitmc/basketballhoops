<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basketball Hoops: Stars Edition</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #game-container { position: relative; border: 8px solid #222; border-radius: 10px; box-shadow: 0 0 100px rgba(255,140,0,0.3); }
        canvas { background: #333; cursor: none; }
        #scoreboard {
            position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; 
            gap: 50px; color: white; font-size: 40px; font-weight: 900; text-shadow: 2px 2px #000;
            pointer-events: none;
        }
        .team-name { font-size: 14px; opacity: 0.8; text-align: center; display: block; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="scoreboard">
            <div><span class="team-name">PLAYER</span> <span id="pScore">0</span></div>
            <div style="color: #ff8c00; font-size: 20px; align-self: center;">VS</div>
            <div><span id="bScore">0</span> <span class="team-name">BOT</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1100;
canvas.height = 550;

const gravity = 0.5;
const floorY = 480;

let keys = {};
window.addEventListener('keydown', e => {
    if(e.code === 'KeyW' && !keys['KeyW']) handleJump(player);
    if(e.code === 'KeyX' && !keys['KeyX']) shoot(player);
    keys[e.code] = true;
});
window.addEventListener('keyup', e => keys[e.code] = false);

class Player {
    constructor(x, color, name) {
        this.x = x; this.y = floorY - 80;
        this.w = 35; this.h = 80;
        this.vx = 0; this.vy = 0;
        this.color = color;
        this.name = name;
        this.jumpCount = 0;
        this.hasBall = false;
    }

    update() {
        if (this === player) {
            if (keys['KeyA']) this.vx = -6;
            else if (keys['KeyD']) this.vx = 6;
            else this.vx *= 0.85;
        }

        this.x += this.vx;
        this.y += this.vy;

        if (this.y + this.h < floorY) {
            this.vy += gravity;
        } else {
            this.y = floorY - this.h;
            this.vy = 0;
            this.jumpCount = 0;
        }
        this.x = Math.max(0, Math.min(canvas.width - this.w, this.x));
    }

    draw() {
        // Player Body (Jersey Style)
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(this.x, this.y + 40, this.w, 40); // Shorts
        
        // Head
        ctx.fillStyle = "#ffdbac";
        ctx.fillRect(this.x + 5, this.y - 30, 25, 30);
    }
}

const ball = {
    x: 550, y: floorY - 20, r: 12, vx: 0, vy: 0,
    owner: null,
    cooldown: 0,
    update() {
        if (this.cooldown > 0) this.cooldown--;
        if (this.owner) {
            this.x = this.owner.x + (this.owner.vx >= 0 ? 45 : -10);
            this.y = this.owner.y + 40 + Math.sin(Date.now()/100) * 15;
        } else {
            this.vy += gravity;
            this.x += this.vx;
            this.y += this.vy;
            if (this.y + this.r > floorY) {
                this.y = floorY - this.r;
                this.vy *= -0.6;
                this.vx *= 0.8;
            }
            if (this.x < 0 || this.x > canvas.width) this.vx *= -0.8;
        }
    },
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = "#ff8c00";
        ctx.fill();
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.stroke();
        // Ball lines
        ctx.beginPath();
        ctx.moveTo(this.x - this.r, this.y);
        ctx.lineTo(this.x + this.r, this.y);
        ctx.stroke();
    }
};

const player = new Player(200, '#0055ff', 'YOU');
const bot = new Player(850, '#ff3300', 'BOT');
let pScore = 0, bScore = 0;

function handleJump(p) {
    if (p.jumpCount < 2) {
        p.vy = -12;
        p.jumpCount++;
    }
}

function shoot(p) {
    if (!p.hasBall) return;
    ball.owner = null;
    p.hasBall = false;
    ball.cooldown = 30;

    // Fixed Pro-Shot Logic: calculates arc based on target hoop
    let targetHoopX = (p === player) ? 1020 : 80;
    let dist = targetHoopX - p.x;
    
    ball.vx = dist * 0.045; // Automatic distance calculation
    ball.vy = -14 + (Math.abs(dist) * -0.01); // Height based on distance
}

function drawCourt() {
    // Floor (Wood Texture)
    let grad = ctx.createLinearGradient(0, floorY, 0, floorY + 70);
    grad.addColorStop(0, '#e8b97d');
    grad.addColorStop(1, '#bc8f5b');
    ctx.fillStyle = grad;
    ctx.fillRect(0, floorY, canvas.width, 70);
    
    // Glossy Finish
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    ctx.fillRect(0, floorY, canvas.width, 10);

    // Lines
    ctx.strokeStyle = "rgba(255,255,255,0.7)";
    ctx.lineWidth = 4;
    ctx.strokeRect(0, floorY, canvas.width, 0); // Baseline
    ctx.beginPath(); ctx.moveTo(canvas.width/2, floorY); ctx.lineTo(canvas.width/2, floorY+70); ctx.stroke(); // Half
    
    // 3-Point Arcs
    ctx.beginPath(); ctx.arc(0, 300, 350, -Math.PI/2, Math.PI/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(canvas.width, 300, 350, Math.PI/2, -Math.PI/2); ctx.stroke();

    drawHoop(80, 250, true); // Left
    drawHoop(1020, 250, false); // Right
}

function drawHoop(x, y, isLeft) {
    // Backboard (Glass style)
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    ctx.fillRect(isLeft ? x-20 : x, y-80, 20, 120);
    ctx.strokeStyle = "white";
    ctx.strokeRect(isLeft ? x-20 : x, y-80, 20, 120);

    // Rim
    ctx.strokeStyle = "#ff4500";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(isLeft ? x : x-60, y);
    ctx.lineTo(isLeft ? x+60 : x, y);
    ctx.stroke();

    // Net (Physics wave)
    ctx.strokeStyle = "rgba(255,255,255,0.6)";
    ctx.setLineDash([4, 4]);
    ctx.lineWidth = 2;
    for(let i=0; i<6; i++) {
        ctx.beginPath();
        let nx = isLeft ? x + (i*10) : x - 60 + (i*10);
        ctx.moveTo(nx, y);
        ctx.quadraticCurveTo(nx + Math.sin(Date.now()/300)*5, y+20, nx, y+50);
        ctx.stroke();
    }
    ctx.setLineDash([]);
}

function updateBot() {
    if (!ball.owner && ball.cooldown === 0) {
        if (ball.x > bot.x) bot.vx = 4; else bot.vx = -4;
    } else if (bot.hasBall) {
        if (bot.x > 300) bot.vx = -5;
        else { bot.vx = 0; shoot(bot); }
    }
    bot.update();
}

function checkScoring() {
    // Player scores in Right Hoop
    if (ball.vy > 0 && ball.x > 980 && ball.x < 1060 && Math.abs(ball.y - 250) < 15) {
        pScore++; resetBall();
    }
    // Bot scores in Left Hoop
    if (ball.vy > 0 && ball.x < 120 && ball.x > 40 && Math.abs(ball.y - 250) < 15) {
        bScore++; resetBall();
    }
}

function resetBall() {
    ball.x = 550; ball.y = 100; ball.vx = 0; ball.vy = 0;
    ball.owner = null; player.hasBall = false; bot.hasBall = false;
    document.getElementById('pScore').innerText = pScore;
    document.getElementById('bScore').innerText = bScore;
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawCourt();
    player.update();
    updateBot();
    ball.update();

    if (!ball.owner && ball.cooldown === 0) {
        [player, bot].forEach(p => {
            let dx = p.x + p.w/2 - ball.x;
            let dy = p.y + p.h/2 - ball.y;
            if (Math.sqrt(dx*dx + dy*dy) < 50) {
                p.hasBall = true; ball.owner = p;
            }
        });
    }

    checkScoring();
    player.draw();
    bot.draw();
    ball.draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
